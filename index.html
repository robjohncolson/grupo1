<!DOCTYPE html>
<html>
<head>
  <title>Mini Block Blast</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #222;
      color: white;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(8, 40px);
      grid-gap: 4px;
      justify-content: center;
      margin: 20px;
    }
    .cell {
      width: 40px;
      height: 40px;
      background: #444;
    }
    .filled {
      background: #4caf50;
    }
    .preview-good {
      background: #2e7d32;
      outline: 2px solid #a5d6a7;
    }
    .preview-bad {
      background: #b71c1c;
      outline: 2px solid #ef9a9a;
    }
    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
    button.selected {
      outline: 3px solid #ffeb3b;
      background: #555;
      color: white;
    }
  </style>
</head>
<body>

<h1>Mini Block Blast</h1>
<p>Click a block, then click the grid to place it</p>

<div id="grid"></div>

<div id="blocks"></div>

<p>Score: <span id="score">0</span></p>

<script>
const gridSize = 8;
let grid = Array(gridSize * gridSize).fill(0);
let score = 0;
let selectedBlock = null;
let selectedIndex = -1;

const shapes = [
  [[1,1],[1,1]],        // square
  [[1,1,1]],            // line
  [[1],[1],[1]],        // vertical
  [[1,1,0],[0,1,1]]     // zigzag
];

function shapeCells(shape, x, y) {
  const cells = [];
  for (let dy = 0; dy < shape.length; dy++) {
    for (let dx = 0; dx < shape[dy].length; dx++) {
      if (shape[dy][dx]) cells.push({ x: x + dx, y: y + dy });
    }
  }
  return cells;
}

function canPlaceAt(shape, x, y) {
  const cells = shapeCells(shape, x, y);
  for (const c of cells) {
    if (c.x < 0 || c.x >= gridSize || c.y < 0 || c.y >= gridSize) return false;
    if (grid[c.y * gridSize + c.x]) return false;
  }
  return true;
}

function drawGrid() {
  const gridEl = document.getElementById("grid");
  gridEl.innerHTML = "";
  grid.forEach((cell, i) => {
    const div = document.createElement("div");
    div.className = "cell" + (cell ? " filled" : "");
    div.onclick = () => placeBlock(i);
    div.onmouseenter = () => showPreview(i);
    div.onmouseleave = clearPreview;
    gridEl.appendChild(div);
  });
}

function showPreview(index) {
  if (!selectedBlock) return;
  const x = index % gridSize;
  const y = Math.floor(index / gridSize);
  const ok = canPlaceAt(selectedBlock, x, y);
  const cells = shapeCells(selectedBlock, x, y);
  const gridEl = document.getElementById("grid");
  const children = gridEl.children;
  for (const c of cells) {
    if (c.x < 0 || c.x >= gridSize || c.y < 0 || c.y >= gridSize) continue;
    const cellEl = children[c.y * gridSize + c.x];
    cellEl.classList.add(ok ? "preview-good" : "preview-bad");
  }
}

function clearPreview() {
  const gridEl = document.getElementById("grid");
  for (const child of gridEl.children) {
    child.classList.remove("preview-good", "preview-bad");
  }
}

function drawBlocks() {
  const container = document.getElementById("blocks");
  container.innerHTML = "";
  shapes.forEach((shape, index) => {
    const btn = document.createElement("button");
    btn.innerText = "Block " + (index+1);
    if (index === selectedIndex) btn.classList.add("selected");
    btn.onclick = () => {
      selectedBlock = shape;
      selectedIndex = index;
      drawBlocks();
    };
    container.appendChild(btn);
  });
}

function placeBlock(index) {
  if (!selectedBlock) return;

  const x = index % gridSize;
  const y = Math.floor(index / gridSize);

  if (!canPlaceAt(selectedBlock, x, y)) return;

  for (const c of shapeCells(selectedBlock, x, y)) {
    grid[c.y * gridSize + c.x] = 1;
  }

  clearLines();
  selectedBlock = null;
  selectedIndex = -1;
  clearPreview();
  drawGrid();
  drawBlocks();
}

function clearLines() {
  // rows
  for (let y = 0; y < gridSize; y++) {
    let full = true;
    for (let x = 0; x < gridSize; x++) {
      if (!grid[y * gridSize + x]) full = false;
    }
    if (full) {
      for (let x = 0; x < gridSize; x++) {
        grid[y * gridSize + x] = 0;
      }
      score += 10;
    }
  }

  // columns
  for (let x = 0; x < gridSize; x++) {
    let full = true;
    for (let y = 0; y < gridSize; y++) {
      if (!grid[y * gridSize + x]) full = false;
    }
    if (full) {
      for (let y = 0; y < gridSize; y++) {
        grid[y * gridSize + x] = 0;
      }
      score += 10;
    }
  }

  document.getElementById("score").innerText = score;
}

drawGrid();
drawBlocks();
</script>

</body>
</html>
