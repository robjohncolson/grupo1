<!DOCTYPE html>
<html>
<head>
  <title>Mini Block Blast</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #222;
      color: white;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(8, 40px);
      grid-gap: 4px;
      justify-content: center;
      margin: 20px;
    }
    .cell {
      width: 40px;
      height: 40px;
      background: #444;
    }
    .filled {
      background: #4caf50;
    }
    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Mini Block Blast</h1>
<p>Click a block, then click the grid to place it</p>

<div id="grid"></div>

<div id="blocks"></div>

<p>Score: <span id="score">0</span></p>

<script>
const gridSize = 8;
let grid = Array(gridSize * gridSize).fill(0);
let score = 0;
let selectedBlock = null;

const shapes = [
  [[1,1],[1,1]],        // square
  [[1,1,1]],            // line
  [[1],[1],[1]],        // vertical
  [[1,1,0],[0,1,1]]     // zigzag
];

function drawGrid() {
  const gridEl = document.getElementById("grid");
  gridEl.innerHTML = "";
  grid.forEach((cell, i) => {
    const div = document.createElement("div");
    div.className = "cell" + (cell ? " filled" : "");
    div.onclick = () => placeBlock(i);
    gridEl.appendChild(div);
  });
}

function drawBlocks() {
  const container = document.getElementById("blocks");
  container.innerHTML = "";
  shapes.forEach((shape, index) => {
    const btn = document.createElement("button");
    btn.innerText = "Block " + (index+1);
    btn.onclick = () => selectedBlock = shape;
    container.appendChild(btn);
  });
}

function placeBlock(index) {
  if (!selectedBlock) return;

  const x = index % gridSize;
  const y = Math.floor(index / gridSize);

  for (let dy = 0; dy < selectedBlock.length; dy++) {
    for (let dx = 0; dx < selectedBlock[dy].length; dx++) {
      if (selectedBlock[dy][dx]) {
        let nx = x + dx;
        let ny = y + dy;
        if (nx >= gridSize || ny >= gridSize) return;
        if (grid[ny * gridSize + nx]) return;
      }
    }
  }

  for (let dy = 0; dy < selectedBlock.length; dy++) {
    for (let dx = 0; dx < selectedBlock[dy].length; dx++) {
      if (selectedBlock[dy][dx]) {
        let nx = x + dx;
        let ny = y + dy;
        grid[ny * gridSize + nx] = 1;
      }
    }
  }

  clearLines();
  selectedBlock = null;
  drawGrid();
}

function clearLines() {
  // rows
  for (let y = 0; y < gridSize; y++) {
    let full = true;
    for (let x = 0; x < gridSize; x++) {
      if (!grid[y * gridSize + x]) full = false;
    }
    if (full) {
      for (let x = 0; x < gridSize; x++) {
        grid[y * gridSize + x] = 0;
      }
      score += 10;
    }
  }

  // columns
  for (let x = 0; x < gridSize; x++) {
    let full = true;
    for (let y = 0; y < gridSize; y++) {
      if (!grid[y * gridSize + x]) full = false;
    }
    if (full) {
      for (let y = 0; y < gridSize; y++) {
        grid[y * gridSize + x] = 0;
      }
      score += 10;
    }
  }

  document.getElementById("score").innerText = score;
}

drawGrid();
drawBlocks();
</script>

</body>
</html>
